name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Only develop can merge into main
        run: |
          echo "base=${{ github.event.pull_request.base.ref }}"
          echo "head=${{ github.event.pull_request.head.ref }}"
          if [ "${{ github.event.pull_request.base.ref }}" = "main" ] && [ "${{ github.event.pull_request.head.ref }}" != "develop" ]; then
            echo "Pull requests into main must come from develop."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run Ruff
        run: python -m ruff check .

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          python -m playwright install chromium

      - name: Run Pytest
        run: python -m pytest

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run pip check
        run: python -m pip check

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          python -m playwright install chromium

      - name: Run CLI smoke test
        env:
          DATABASE_URL: sqlite:///data/ci_jobseeking_agent.db
        run: |
          python -m jobseeking_agent doctor
          jobseek --help
          jobseek db init

  app-import-smoke:
    name: Service Import Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run app import smoke test
        run: |
          python -c "from identity_service.main import app; print(app.title)"
          python -c "from communication_service.main import app; print(app.title)"
          python -c "from ai_service.main import app; print(app.title)"
          python -c "import jobseeking_agent.web_app; print('legacy web import ok')"

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: apps/web
        run: npm ci

      - name: Build frontend
        working-directory: apps/web
        run: npm run build

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          docker compose --env-file .env -f infra/docker-compose.yml config

      - name: Build identity service image
        run: |
          docker build \
            --build-arg SERVICE_NAME=identity-service \
            -f infra/docker/python-service.Dockerfile \
            -t jobseeking-agent-identity-service:ci .

  quality:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          python -m playwright install chromium

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest

      - name: Dependency check
        run: python -m pip check

      - name: CLI smoke test
        env:
          DATABASE_URL: sqlite:///data/ci_jobseeking_agent.db
        run: |
          python -m jobseeking_agent doctor
          jobseek --help
          jobseek db init

      - name: App import smoke test
        run: |
          python -c "from identity_service.main import app; print(app.title)"
          python -c "from communication_service.main import app; print(app.title)"
          python -c "from ai_service.main import app; print(app.title)"
          python -c "import jobseeking_agent.web_app; print('legacy web import ok')"
